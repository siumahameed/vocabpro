{% extends "base.html" %}

{% block title %}Reset Password - VocabPro{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-green-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo & Header -->
        <div class="text-center mb-6">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-gray-800"><span class="text-blue-600">Vocab</span><span class="text-green-500">Pro</span></span>
            </a>
            <h1 class="mt-6 text-xl font-semibold text-gray-800">Enter Reset Code</h1>
            <p class="mt-1 text-sm text-gray-500">Check WhatsApp for the 6-digit code</p>
        </div>
        
        <!-- Form -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <form id="resetForm" class="space-y-4">
                <!-- Reset Code -->
                <div>
                    <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Reset Code</label>
                    <input type="text" id="code" name="code" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-gray-50 text-center text-lg tracking-widest" placeholder="000000" maxlength="6">
                    <p id="codeError" class="mt-1 text-xs text-red-600 hidden"></p>
                </div>
                
                <!-- New Password -->
                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-gray-50" placeholder="Min 6 characters">
                    <p id="passwordError" class="mt-1 text-xs text-red-600 hidden"></p>
                </div>
                
                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-gray-50" placeholder="Re-enter password">
                    <p id="confirmError" class="mt-1 text-xs text-red-600 hidden"></p>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white py-2.5 rounded-lg font-medium hover:bg-green-600 transition flex items-center justify-center">
                    <span>Reset Password</span>
                    <svg id="loadingIcon" class="w-4 h-4 ml-2 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                
                <div id="formSuccess" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-2.5 rounded-lg text-sm text-center"></div>
                <div id="formError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-lg text-sm text-center"></div>
            </form>
            
            <!-- Resend Code -->
            <div class="mt-4 pt-4 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-600">
                    Didn't get code? <a href="/forgot-password" class="text-blue-600 font-medium hover:text-blue-800">Resend</a>
                </p>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-gray-500 hover:text-gray-700">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('resetForm');
        const codeInput = document.getElementById('code');
        const codeError = document.getElementById('codeError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');
        const formSuccess = document.getElementById('formSuccess');
        const formError = document.getElementById('formError');
        const submitBtn = document.getElementById('submitBtn');
        const loadingIcon = document.getElementById('loadingIcon');
        
        codeInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
        codeInput.focus();
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            codeError.classList.add('hidden');
            passwordError.classList.add('hidden');
            confirmError.classList.add('hidden');
            formSuccess.classList.add('hidden');
            formError.classList.add('hidden');
            
            const code = codeInput.value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = localStorage.getItem('vocabpro_reset_phone') || '';
            
            let hasError = false;
            
            if (!code || code.length !== 6) {
                codeError.textContent = 'Enter 6-digit code';
                codeError.classList.remove('hidden');
                hasError = true;
            }
            
            if (!newPassword || newPassword.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters';
                passwordError.classList.remove('hidden');
                hasError = true;
            }
            
            if (newPassword !== confirmPassword) {
                confirmError.textContent = 'Passwords do not match';
                confirmError.classList.remove('hidden');
                hasError = true;
            }
            
            if (!phone) {
                formError.textContent = 'Please go back and enter your WhatsApp number first';
                formError.classList.remove('hidden');
                hasError = true;
            }
            
            if (hasError) return;
            
            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = 'Resetting...';
            loadingIcon.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, code, new_password: newPassword })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    formSuccess.textContent = '✓ Password reset successful! Redirecting...';
                    formSuccess.classList.remove('hidden');
                    localStorage.removeItem('vocabpro_reset_phone');
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    formError.textContent = data.message;
                    formError.classList.remove('hidden');
                }
            } catch (error) {
                formError.textContent = 'Something went wrong. Please try again.';
                formError.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = 'Reset Password';
                loadingIcon.classList.add('hidden');
            }
        });
    });
</script>
{% endblock %}
