{% extends "base.html" %}

{% block title %}Admin Login - VocabPro{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-green-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-gray-800"><span class="text-blue-600">Vocab</span><span class="text-green-500">Pro</span></span>
            </a>
            <h1 class="mt-6 text-xl font-semibold text-gray-800">Admin Login</h1>
            <p class="mt-1 text-sm text-gray-500">Enter your credentials to access admin panel</p>
        </div>
        
        <!-- Login Form -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <form id="adminLoginForm" class="space-y-4">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-gray-50" placeholder="Enter username">
                    <p id="usernameError" class="mt-1 text-xs text-red-600 hidden"></p>
                </div>
                
                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required class="w-full px-3 py-2.5 pr-10 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-gray-50" placeholder="Enter password">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                        </button>
                    </div>
                    <p id="passwordError" class="mt-1 text-xs text-red-600 hidden"></p>
                </div>
                
                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600 cursor-pointer">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 mr-2">Remember me
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition flex items-center justify-center">
                    <span>Sign In</span>
                    <svg id="loadingIcon" class="w-4 h-4 ml-2 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                
                <div id="formError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-lg text-sm"></div>
            </form>
        </div>
        
        <!-- Back to Home -->
        <div class="mt-4 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-gray-700">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');
        
        togglePassword.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        });
        
        // Check for saved credentials
        const savedUsername = localStorage.getItem('vocabpro_admin_username');
        const savedPassword = localStorage.getItem('vocabpro_admin_password');
        
        if (savedUsername) {
            document.getElementById('username').value = savedUsername;
            document.getElementById('remember').checked = true;
        }
        if (savedPassword) {
            passwordInput.value = savedPassword;
        }
        
        const form = document.getElementById('adminLoginForm');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const formError = document.getElementById('formError');
        const submitBtn = document.getElementById('submitBtn');
        const loadingIcon = document.getElementById('loadingIcon');
        const rememberCheckbox = document.getElementById('remember');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            usernameError.classList.add('hidden');
            passwordError.classList.add('hidden');
            formError.classList.add('hidden');
            
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value;
            const remember = rememberCheckbox.checked;
            
            let hasError = false;
            
            if (!username) {
                usernameError.textContent = 'Username is required';
                usernameError.classList.remove('hidden');
                hasError = true;
            }
            
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.classList.remove('hidden');
                hasError = true;
            }
            
            if (hasError) return;
            
            if (remember) {
                localStorage.setItem('vocabpro_admin_username', username);
                localStorage.setItem('vocabpro_admin_password', password);
            } else {
                localStorage.removeItem('vocabpro_admin_username');
                localStorage.removeItem('vocabpro_admin_password');
            }
            
            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = 'Signing in...';
            loadingIcon.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    window.location.href = '/portal-manager-sium';
                } else {
                    formError.textContent = data.message || 'Invalid credentials';
                    formError.classList.remove('hidden');
                }
            } catch (error) {
                formError.textContent = 'Something went wrong. Please try again.';
                formError.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = 'Sign In';
                loadingIcon.classList.add('hidden');
            }
        });
    });
</script>
{% endblock %}
